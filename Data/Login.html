<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/Images/Faviocn.png">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            height: 100vh;
            background-image: url(/Images/background.png);
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login {
            width: 340px;
            padding: 40px 30px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px);
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 35px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            height: 45px;
            margin-bottom: 15px;
            padding: 0 15px;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        #submit {
            background: #fff;
            color: #2d5a3d;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        #submit:hover {
            background: #6fd494;
            color: #fff;
        }

        a {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            text-decoration: none;
        }

        a:hover {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="login">
        <h1>Login</h1>
        <form action="/index.html" method="get">
            <input type="text" placeholder="邮箱 / 用户名" required>
            <input type="password" placeholder="密码" required>
            <input type="submit" id="submit" value="Login">
        </form>
        <br>
        <a href="#">忘记密码？</a> · <a href="#">注册账号</a>
    </div>
</body>
</html>
